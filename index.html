<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Business Card</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Inter, Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #f5f8fb, #e8eef5);
  color: #083b63;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 22px;
}

.card {
  width: 100%;
  max-width: 430px;
  text-align: center;
  padding: 32px 24px;
  border-radius: 30px;
  background: #ffffff;
  border: 1px solid rgba(8, 59, 99, 0.12);
  box-shadow: 0 24px 70px rgba(0, 34, 68, 0.16);
}

.logo {
  width: 100%;
  max-width: 300px;
  height: auto;
  margin: 0 auto 28px;
  display: block;
}

h1 {
  margin: 0;
  font-size: 30px;
  font-weight: 750;
  letter-spacing: -0.6px;
  color: #003f6b;
}

.position {
  margin-top: 16px;
  font-size: 16px;
  font-weight: 600;
  color: #003f6b;
}

.department {
  margin-top: 6px;
  font-size: 14px;
  color: rgba(0, 63, 107, 0.62);
}

.company {
  margin-top: 8px;
  font-size: 15px;
  color: rgba(0, 63, 107, 0.72);
}

.buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 26px;
}

.button {
  display: block;
  width: 100%;
  padding: 15px 18px;
  border-radius: 15px;
  text-decoration: none;
  background: #004b7f;
  color: #ffffff;
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.secondary {
  background: #eef4f8;
  color: #004b7f;
  border: 1px solid rgba(0, 75, 127, 0.12);
}

.contact-line {
  margin-top: 22px;
  font-size: 13px;
  color: rgba(0, 63, 107, 0.58);
  line-height: 1.7;
  word-break: break-word;
}

.footer {
  margin-top: 24px;
  font-size: 12px;
  line-height: 1.5;
  color: rgba(0, 63, 107, 0.42);
}

.error {
  color: #b00020;
  font-weight: 700;
}
</style>
</head>

<body>
<main class="card">
  <img class="logo" src="bpg-official-logo.png" alt="Baiyun Power Group Logo">

  <h1 id="name">Loading...</h1>
  <div class="position" id="position"></div>
  <div class="department" id="department"></div>
  <div class="company" id="company"></div>

  <div class="buttons">
    <a class="button" id="saveContact" href="#">Save Contact</a>
    <a class="button secondary" id="whatsapp" href="#" target="_blank" rel="noopener">WhatsApp</a>
    <a class="button secondary" id="email" href="#">Email</a>
    <a class="button secondary" id="website" href="#" target="_blank" rel="noopener">Company Website</a>
  </div>

  <div class="contact-line" id="contactLine"></div>

  <div class="footer">
    Baiyun Power Group Co., Ltd.<br>
    Guangzhou, China
  </div>
</main>

<script>
const cards = {
  "hardy-chen": {
    name: "Hardy Chen",
    position: "International Presales Engineer",
    department: "International Marketing Center",
    phone: "+8618123550218",
    whatsapp: "8618123550218",
    email: "Hardychan0901@outlook.com",
    wechat: "Hardy_Channn0901",
    website: "https://www.baiyunpower.com",
    company: "Baiyun Power Group"
  },

  "aimee-yan": {
    name: "Aimee Yan",
    position: "Marketing Manager",
    department: "International Marketing Center",
    phone: "+8618802002525",
    whatsapp: "8618802002525",
    email: "yanht@bpgroup.com.cn",
    wechat: "Aimee_5678_",
    website: "https://www.baiyunpower.com",
    company: "Baiyun Power Group"
  },

  "xindy": {
    name: "xindy",
    position: "worker",
    department: "International Marketing Center",
    phone: "+8613711099141",
    whatsapp: "8613711099141",
    email: "",
    wechat: "",
    website: "https://www.baiyunpower.com",
    company: "Baiyun Power Group"
  },

  "zhou-yaowu": {
    name: "Zhou Yaowu",
    position: "Technical Expert",
    department: "International Marketing Center",
    phone: "+61412337480",
    whatsapp: "61412337480",
    email: "240710652@qq.com",
    wechat: "123456789",
    website: "https://www.baiyunpower.com",
    company: "Baiyun Power Group"
  }
};

function getIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id") || "hardy-chen";
}

function cleanPhoneForWhatsApp(phone) {
  if (!phone) return "";

  return phone
    .replaceAll("+", "")
    .replaceAll(" ", "")
    .replaceAll("-", "")
    .replaceAll("(", "")
    .replaceAll(")", "");
}

function createVCard(person) {
  const lines = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "FN:" + (person.name || ""),
    "ORG:" + (person.company || "Baiyun Power Group"),
    "TITLE:" + (person.position || ""),
    "TEL;TYPE=CELL,VOICE:" + (person.phone || ""),
    "EMAIL;TYPE=INTERNET,WORK:" + (person.email || ""),
    "URL:" + (person.website || "https://www.baiyunpower.com"),
    "NOTE:WeChat: " + (person.wechat || ""),
    "END:VCARD"
  ];

  return lines.join("\r\n");
}

function downloadVCard(person) {
  const vcard = createVCard(person);
  const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = (person.name || "contact").replaceAll(" ", "-") + ".vcf";

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

function loadCard() {
  const id = getIdFromUrl();
  const person = cards[id];

  if (!person) {
    document.getElementById("name").innerHTML = '<span class="error">Contact not found</span>';
    document.getElementById("position").textContent = "Please check the card ID.";
    document.getElementById("department").textContent = "Current ID: " + id;
    return;
  }

  document.title = person.name + " | Digital Business Card";

  document.getElementById("name").textContent = person.name || "";
  document.getElementById("position").textContent = person.position || "";
  document.getElementById("department").textContent = person.department || "";
  document.getElementById("company").textContent = person.company || "Baiyun Power Group";

  const contactParts = [];

  if (person.phone) {
    contactParts.push(person.phone);
  }

  if (person.email) {
    contactParts.push(person.email);
  }

  document.getElementById("contactLine").innerHTML = contactParts.join("<br>");

  document.getElementById("saveContact").onclick = function(e) {
    e.preventDefault();
    downloadVCard(person);
  };

  if (person.whatsapp || person.phone) {
    document.getElementById("whatsapp").href =
      "https://wa.me/" + cleanPhoneForWhatsApp(person.whatsapp || person.phone);
  } else {
    document.getElementById("whatsapp").style.display = "none";
  }

  if (person.email) {
    document.getElementById("email").href = "mailto:" + person.email;
  } else {
    document.getElementById("email").style.display = "none";
  }

  if (person.website) {
    document.getElementById("website").href = person.website;
  } else {
    document.getElementById("website").style.display = "none";
  }
}

loadCard();
</script>
</body>
</html>
