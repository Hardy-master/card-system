<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Data Generator</title>
<style>
body{
  font-family:Arial,Helvetica,sans-serif;
  background:#f5f8fb;
  color:#083b63;
  padding:24px;
}

.container{
  max-width:760px;
  margin:0 auto;
  background:#fff;
  padding:24px;
  border-radius:18px;
  box-shadow:0 12px 40px rgba(0,34,68,.12);
}

label{
  display:block;
  margin-top:14px;
  font-weight:700;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccd8e2;
  margin-top:6px;
  font-size:15px;
}

button{
  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#004b7f;
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

pre{
  background:#0b1f33;
  color:#d9f2ff;
  padding:18px;
  border-radius:12px;
  overflow:auto;
  white-space:pre-wrap;
}

.small{
  color:#60758a;
  font-size:13px;
}
</style>
</head>

<body>
<div class="container">
  <h1>Digital Card Data Generator</h1>
  <p class="small">Fill in employee information. Copy the generated JSON block into data.json.</p>

  <label>Name</label>
  <input id="name" placeholder="Lin Xiaoling">

  <label>Position</label>
  <input id="position" placeholder="Sales Manager">

  <label>Department</label>
  <input id="department" value="International Marketing Center">

  <label>Phone</label>
  <input id="phone" placeholder="+8613711099141">

  <label>WhatsApp</label>
  <input id="whatsapp" placeholder="+8613711099141">

  <label>Email</label>
  <input id="email" placeholder="name@baiyunpower.com">

  <label>WeChat</label>
  <input id="wechat" placeholder="wechat_id">

  <label>Website</label>
  <input id="website" value="https://www.baiyunpower.com">

  <button onclick="generate()">Generate JSON</button>

  <h2>Generated Data</h2>
  <pre id="output"></pre>

  <h2>Card Link</h2>
  <pre id="link"></pre>
</div>

<script>
function slugify(name) {
  return name
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-|-$/g, "");
}

function cleanPhone(phone) {
  return phone.replaceAll(" ", "").replaceAll("-", "");
}

function generate() {
  const name = document.getElementById("name").value.trim();
  const slug = slugify(name);

  const person = {
    name: name,
    position: document.getElementById("position").value.trim(),
    department: document.getElementById("department").value.trim(),
    phone: cleanPhone(document.getElementById("phone").value.trim()),
    whatsapp: cleanPhone(document.getElementById("whatsapp").value.trim()),
    email: document.getElementById("email").value.trim(),
    wechat: document.getElementById("wechat").value.trim(),
    website: document.getElementById("website").value.trim(),
    company: "Baiyun Power Group"
  };

  const jsonBlock = '"' + slug + '": ' + JSON.stringify(person, null, 2);

  document.getElementById("output").textContent = jsonBlock + ",";

  document.getElementById("link").textContent =
    "https://hardy-master.github.io/card-system/?id=" + slug;
}
</script>
</body>
</html>
